services:
  server:
    depends_on:
      - db
    build:
      context: .
      dockerfile: ./Dockerfile-development
    ports:
      - ${SERVER_PORT:-3000}:${SERVER_PORT:-3000}
    environment:
      - NODE_ENV=development
      - SECRET=${SECRET:-dev_secret}
      - SERVER_PORT=${SERVER_PORT:-3000}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-epub-checker_dev_db}
      - POSTGRES_USER=${POSTGRES_USER:-epub-checker_user_dev}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - POSTGRES_ALLOW_SELF_SIGNED_CERTIFICATES=${POSTGRES_ALLOW_SELF_SIGNED_CERTIFICATES}
      - POSTGRES_CA_CERT=${POSTGRES_CA_CERT}
    command: ['yarn', 'coko-server', 'start-dev']
    volumes:
      - ./server:/home/node/epub-checker/server
      - ./config:/home/node/epub-checker/config
    tty: true

  db:
    image: postgres:16
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-epub-checker_dev_db}
      - POSTGRES_USER=${POSTGRES_USER:-epub-checker_user_dev}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
