# This file is meant for running a production build LOCALLY.
# If you use the epubchecker microservice in production, use the pre-built image cokoapps/epubchecker

services:
  server:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - ${SERVER_PORT:-3000}:${SERVER_PORT:-3000}
    environment:
      - NODE_ENV=production
      - SECRET=${SECRET:-dev_secret}
      - SERVER_PORT=${SERVER_PORT:-3000}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-epub-checker_dev_db}
      - POSTGRES_USER=${POSTGRES_USER:-epub-checker_user_dev}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - POSTGRES_ALLOW_SELF_SIGNED_CERTIFICATES=${POSTGRES_ALLOW_SELF_SIGNED_CERTIFICATES}
      - POSTGRES_CA_CERT=${POSTGRES_CA_CERT}

  db:
    image: postgres:16
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-epub-checker_dev_db}
      - POSTGRES_USER=${POSTGRES_USER:-epub-checker_user_dev}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
